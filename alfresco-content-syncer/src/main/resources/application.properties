quarkus.application.name=alfresco-content-syncer
quarkus.http.port=9093
quarkus.http.host=0.0.0.0
quarkus.package.jar.type=uber-jar
quarkus.jackson.write-dates-as-timestamps=false
syncer.runtime.root=${user.dir}
syncer.logs.dir=${syncer.runtime.root}/logs
syncer.data-dir=${syncer.runtime.root}/.syncer-data
syncer.jobrunr.data-dir=${syncer.runtime.root}/data
syncer.jobrunr.dashboard-host=127.0.0.1
syncer.jobrunr.dashboard-port=8000
quarkus.log.file.enabled=true
quarkus.log.file.path=${syncer.logs.dir}/alfresco-content-syncer.log
quarkus.log.file.rotation.enabled=true
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=10
quarkus.log.file.rotation.rotate-on-boot=true
quarkus.log.file.async.enabled=true
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.category."org.alfresco.contentlake.syncer".level=INFO
syncer.jobs.max-concurrent=2
syncer.alfresco.max-attempts=3
syncer.alfresco.retry-delay-ms=500
syncer.ui.auth-token=
syncer.ui.open-browser-on-startup=true
syncer.ui.startup-host=127.0.0.1
syncer.ui.startup-delay-ms=1200
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.datasource.jdbc.url=jdbc:h2:file:${syncer.jobrunr.data-dir}/jobrunr-db;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.jdbc.max-size=8
quarkus.datasource.jdbc.initial-size=1
quarkus.jobrunr.background-job-server.enabled=true
quarkus.jobrunr.background-job-server.worker-count=${syncer.jobs.max-concurrent}
quarkus.jobrunr.dashboard.enabled=true
quarkus.jobrunr.dashboard.port=${syncer.jobrunr.dashboard-port}
